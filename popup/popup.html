<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NoteMath</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="hdr">
      <h1 class="title" id="extTitle"></h1>
      <button type="button" class="linkish" id="btnOptions"></button>
    </header>

    <div class="popup-body">

      <button type="button" class="btn primary open-calc" id="btnOpenCalc"></button>

      <section class="notesNav">
        <div class="notesNavHead">
          <span class="lbl" id="lblNotesList"></span>
          <button type="button" class="btn icon" id="btnNew" title=""></button>
        </div>
        <div class="noteTabs" id="noteTabs" role="tablist" aria-label="Заметки"></div>
        <div class="noteEdit">
          <input type="text" id="inpNoteName" class="inp" maxlength="64" />
          <div class="noteEditActions">
            <button type="button" class="btn sm" id="btnRename"></button>
            <button type="button" class="btn sm danger" id="btnDelete"></button>
          </div>
        </div>
      </section>

      <section class="expr">
        <label class="lbl" for="inpExpr" id="lblExpr"></label>
        <input type="text" id="inpExpr" class="inp" autocomplete="off" spellcheck="false" />
        <div class="exprRow">
          <button type="button" class="btn primary" id="btnAdd"></button>
          <button type="button" class="btn" id="btnEval"></button>
        </div>
        <div class="calcOut" id="elCalcOut"></div>
      </section>

      <section class="totalBox">
        <span class="lbl" id="lblTotal"></span>
        <div class="big" id="elTotal">—</div>
      </section>

      <section class="hist" id="hist"></section>

      <section class="notesBox">
        <div class="notesHead">
          <label class="lbl" for="txtNotes" id="lblNotes"></label>
          <span class="noteState" id="noteState"></span>
        </div>
        <textarea id="txtNotes" class="notes" spellcheck="false"></textarea>
        <div class="noteHint" id="noteHint"></div>
      </section>

      <div class="actions">
        <button type="button" class="btn primary" id="btnCopy"></button>
        <button type="button" class="btn" id="btnUndo"></button>
        <button type="button" class="btn" id="btnRedo"></button>
        <button type="button" class="btn" id="btnReset"></button>
      </div>

      <div class="export-group">
        <button type="button" class="btn" id="btnTxt"></button>
        <button type="button" class="btn" id="btnJson"></button>
      </div>

    </div>

    <footer class="popup-footer">
      <label class="chk">
        <input type="checkbox" id="chkPanel" />
        <span id="lblPanel"></span>
      </label>
      <button type="button" class="btn sm" id="btnResetPos"></button>
    </footer>

    <script src="../lib/number-parse.js"></script>
    <script src="../lib/math-utils.js"></script>
    <script src="../lib/parser.js"></script>
    <script src="../lib/storage-model.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
